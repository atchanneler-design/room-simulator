<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部屋シミュレーター</title>
<style>
:root {
  --red: #e4001b;
  --red-bg: #fff0f0;
  --floor: #f5ead8;
  --wall: #7a5c3a;
  --card: #fff;
  --bg: #f0f0f0;
  --border: #ddd;
  --text: #333;
  --muted: #888;
  --shadow: 0 2px 8px rgba(0,0,0,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 600px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Setup ── */
#setup {
  position: fixed; inset: 0; z-index: 999;
  background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px;
  gap: 12px;
}
#setup.hidden { display: none; }
#setup .logo { font-size: 56px; }
#setup h2 { font-size: 22px; color: var(--red); }
#setup p  { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }
#setup input {
  width: 100%; padding: 12px;
  border: 2px solid var(--border); border-radius: 10px;
  font-size: 14px;
}
#setup input:focus { outline: none; border-color: var(--red); }
#setup a { color: var(--red); }

/* ── Buttons ── */
.btn-primary {
  background: var(--red); color: #fff;
  border: none; border-radius: 10px;
  padding: 12px 20px; font-size: 15px; font-weight: bold;
  cursor: pointer; width: 100%;
}
.btn-ghost {
  background: none; border: none;
  color: var(--muted); font-size: 13px;
  cursor: pointer; padding: 4px;
}
.btn-icon {
  background: rgba(255,255,255,.2); border: none;
  color: #fff; width: 36px; height: 36px;
  border-radius: 50%; font-size: 16px;
  cursor: pointer; display: grid; place-items: center;
}

/* ── Header ── */
header {
  background: var(--red); color: #fff;
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 80;
  box-shadow: 0 2px 6px rgba(228,0,27,.3);
}
header h1 { font-size: 17px; font-weight: bold; }

/* ── Category tabs ── */
#categories {
  background: var(--card);
  padding: 8px 12px;
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
#categories::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  padding: 6px 14px;
  border: 1.5px solid var(--border); border-radius: 20px;
  background: #fff; color: var(--text);
  font-size: 13px; cursor: pointer;
}
.cat-btn.active {
  border-color: var(--red); color: var(--red);
  background: var(--red-bg); font-weight: bold;
}

/* ── Search ── */
#search-bar {
  background: var(--card);
  padding: 8px 12px;
  display: flex; gap: 8px;
  border-bottom: 1px solid var(--border);
}
#search-input {
  flex: 1; padding: 8px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px;
}
#search-input:focus { outline: none; border-color: var(--red); }
#search-btn {
  background: var(--red); color: #fff;
  border: none; border-radius: 8px;
  padding: 8px 16px; font-size: 14px; cursor: pointer;
}

/* ── Room controls ── */
#room-controls {
  background: var(--card);
  padding: 7px 12px;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
#room-controls label { color: var(--muted); }
.sz-btn {
  padding: 4px 10px;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: #fff; font-size: 13px; cursor: pointer;
}
.sz-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
#room-dim { margin-left: auto; font-size: 11px; color: var(--muted); }

/* ── Room wrapper ── */
#room-wrap {
  background: #c8b89a;
  padding: 14px;
  display: flex; justify-content: center; align-items: center;
}
#room-svg {
  display: block;
  max-width: 100%;
  touch-action: none;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.25));
}
.furniture-sel { filter: drop-shadow(0 0 5px rgba(228,0,27,.8)); }

/* ── Furniture panel ── */
#furn-panel {
  background: var(--card);
  border-top: 3px solid var(--red);
  padding: 12px 16px;
}
#furn-panel.hidden { display: none; }
.fp-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.fp-header strong { font-size: 14px; }
.fp-header .del-btn {
  background: #fee2e2; color: #dc2626;
  border: none; border-radius: 6px;
  padding: 4px 10px; font-size: 12px; cursor: pointer;
}
.slider-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 7px;
}
.slider-row label {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; min-width: 90px;
}
.slider-row input[type=range] { flex: 1; accent-color: var(--red); }
.fp-actions { display: flex; gap: 8px; margin-top: 10px; }
.color-btn {
  flex: 1; padding: 9px;
  background: #f5f5f5; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.color-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,.15); flex-shrink: 0;
}
.buy-btn {
  flex: 1; padding: 9px;
  background: var(--red); color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: bold; cursor: pointer;
}
.buy-btn:disabled { background: #ccc; cursor: default; }

/* ── Color modal ── */
#color-modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
#color-modal.hidden { display: none; }
.modal-box {
  background: #fff; border-radius: 14px;
  padding: 20px; width: 100%; max-width: 380px;
}
.modal-box h3 { font-size: 16px; margin-bottom: 6px; }
.modal-box p  { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
#color-canvas {
  width: 100%; border-radius: 8px;
  cursor: crosshair; display: block;
  border: 1px solid var(--border);
}
.picked-row {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
}
.picked-row span { font-size: 13px; color: var(--muted); }
#picked-swatch {
  width: 32px; height: 32px; border-radius: 6px;
  border: 2px solid var(--border); flex-shrink: 0;
}
#manual-color {
  width: 44px; height: 32px; padding: 2px;
  border-radius: 6px; border: 1px solid var(--border);
  cursor: pointer;
}
#eyedropper-btn {
  background: #f5f5f5; border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px;
  font-size: 12px; cursor: pointer;
}
.modal-footer {
  display: flex; gap: 8px; margin-top: 14px;
}
.modal-footer button {
  flex: 1; padding: 10px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; cursor: pointer;
}
.modal-footer .ok { background: var(--red); color: #fff; border-color: var(--red); }

/* ── Search results ── */
#results-section {
  background: var(--card);
  border-top: 1px solid var(--border);
  flex: 1;
}
#results-header {
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
#results-title { font-size: 13px; font-weight: bold; color: var(--muted); }
#results-list { overflow-y: auto; max-height: 320px; }
.result-item {
  display: flex; align-items: center;
  padding: 10px 14px; gap: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.result-item:hover { background: #fafafa; }
.result-item:active { background: #f5f5f5; }
.result-img {
  width: 60px; height: 60px; object-fit: cover;
  border-radius: 6px; flex-shrink: 0;
  background: #eee;
}
.result-info { flex: 1; min-width: 0; }
.result-name {
  font-size: 12px; color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 4px; line-height: 1.4;
}
.result-price { font-size: 13px; font-weight: bold; color: var(--red); }
.result-add {
  background: var(--red); color: #fff;
  border: none; border-radius: 6px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  flex-shrink: 0; white-space: nowrap;
}
.hint { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 13px; }
.loading { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 13px; }

/* ── Misc ── */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ████ SETUP ████ -->
<div id="setup" class="hidden">
  <div class="logo">🏠</div>
  <h2>部屋シミュレーター</h2>
  <p>楽天市場の家具を部屋に配置してシミュレーション。<br>楽天ウェブサービスのアプリIDを入力して始めましょう。</p>
  <input id="appid-input" type="text" placeholder="楽天アプリID（applicationId）" autocomplete="off" spellcheck="false">
  <small style="color:var(--muted);text-align:center;font-size:12px;">
    <a href="https://webservice.rakuten.co.jp/" target="_blank">webservice.rakuten.co.jp</a> で無料取得できます
  </small>
  <button class="btn-primary" onclick="saveAppId()">シミュレーターを始める</button>
  <button class="btn-ghost" onclick="skipSetup()">APIなしでデモを試す</button>
</div>

<!-- ████ HEADER ████ -->
<header>
  <h1>🏠 部屋シミュレーター</h1>
  <div style="display:flex;gap:8px">
    <button class="btn-icon" onclick="clearRoom()" title="リセット">🗑️</button>
    <button class="btn-icon" onclick="openSetup()" title="API設定">⚙️</button>
  </div>
</header>

<!-- ████ CATEGORIES ████ -->
<div id="categories">
  <button class="cat-btn active" data-cat="ソファ" data-type="sofa">🛋️ ソファ</button>
  <button class="cat-btn" data-cat="ダイニングテーブル" data-type="table">🪑 テーブル</button>
  <button class="cat-btn" data-cat="収納 家具" data-type="storage">🗄️ 収納</button>
  <button class="cat-btn" data-cat="ベッド フレーム" data-type="bed">🛏️ ベッド</button>
</div>

<!-- ████ SEARCH ████ -->
<div id="search-bar">
  <input id="search-input" type="search" placeholder="商品を検索...">
  <button id="search-btn" onclick="doSearch()">検索</button>
</div>

<!-- ████ ROOM CONTROLS ████ -->
<div id="room-controls">
  <label>部屋の大きさ:</label>
  <button class="sz-btn active" data-size="6">6畳</button>
  <button class="sz-btn" data-size="8">8畳</button>
  <button class="sz-btn" data-size="10">10畳</button>
  <button class="sz-btn" data-size="12">12畳</button>
  <span id="room-dim"></span>
</div>

<!-- ████ ROOM SVG ████ -->
<div id="room-wrap">
  <svg id="room-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid50" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M50 0H0V50" fill="none" stroke="rgba(0,0,0,.07)" stroke-width=".5"/>
      </pattern>
      <pattern id="grid100" width="100" height="100" patternUnits="userSpaceOnUse">
        <path d="M100 0H0V100" fill="none" stroke="rgba(0,0,0,.12)" stroke-width=".8"/>
      </pattern>
    </defs>
    <rect id="svg-floor" fill="var(--floor)"/>
    <rect id="svg-grid50" fill="url(#grid50)"/>
    <rect id="svg-grid100" fill="url(#grid100)"/>
    <rect id="svg-wall" fill="none" stroke="var(--wall)" stroke-width="10"/>
    <g id="furn-group"></g>
    <!-- Scale bar -->
    <g id="scale-bar"></g>
  </svg>
</div>

<!-- ████ FURNITURE PANEL ████ -->
<div id="furn-panel" class="hidden">
  <div class="fp-header">
    <strong id="fp-name">選択中の家具</strong>
    <button class="del-btn" onclick="deleteSelected()">🗑️ 削除</button>
  </div>
  <div class="slider-row">
    <label>幅: <span id="lbl-w">120</span>cm</label>
    <input type="range" id="sl-w" min="40" max="380" oninput="onSizeChange()">
  </div>
  <div class="slider-row">
    <label>奥行き: <span id="lbl-h">80</span>cm</label>
    <input type="range" id="sl-h" min="30" max="280" oninput="onSizeChange()">
  </div>
  <div class="fp-actions">
    <button class="color-btn" onclick="openColorModal()">
      <span class="color-dot" id="cur-color-dot"></span>色を取得
    </button>
    <button class="buy-btn" id="buy-btn" onclick="goBuy()">購入する →</button>
  </div>
</div>

<!-- ████ COLOR MODAL ████ -->
<div id="color-modal" class="hidden">
  <div class="modal-box">
    <h3>🎨 色を取得</h3>
    <p id="color-desc">商品写真をタップして色を選択してください</p>
    <canvas id="color-canvas"></canvas>
    <div class="picked-row">
      <span>選択色:</span>
      <div id="picked-swatch"></div>
      <input type="color" id="manual-color" onchange="setPickedColor(this.value)">
      <button id="eyedropper-btn" onclick="useEyeDropper()" style="display:none">🔍 スポイト</button>
    </div>
    <div class="modal-footer">
      <button onclick="closeColorModal()">キャンセル</button>
      <button class="ok" onclick="applyColor()">この色を使う</button>
    </div>
  </div>
</div>

<!-- ████ SEARCH RESULTS ████ -->
<div id="results-section">
  <div id="results-header">
    <span id="results-title">カテゴリを選んで商品を追加しましょう</span>
  </div>
  <div id="results-list">
    <p class="hint">上のカテゴリボタンを押すと商品が表示されます</p>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════
// Constants
// ════════════════════════════════
const SVG_NS = 'http://www.w3.org/2000/svg';

const ROOM_CM = {
  6:  { w: 364, h: 273 },
  8:  { w: 364, h: 364 },
  10: { w: 455, h: 364 },
  12: { w: 546, h: 364 }
};

const FURN_DEFAULTS = {
  sofa:    { w: 190, h: 85,  color: '#9C7856', label: 'ソファ' },
  table:   { w: 120, h: 75,  color: '#C8A870', label: 'テーブル' },
  storage: { w: 90,  h: 45,  color: '#C4A882', label: '収納' },
  bed:     { w: 140, h: 200, color: '#7EB8D4', label: 'ベッド' }
};

// ════════════════════════════════
// State
// ════════════════════════════════
const S = {
  roomSize: 6,
  furniture: [],    // { id, type, name, x, y, w, h, color, url, imageUrl }
  selectedId: null,
  nextId: 1,
  category: 'ソファ',
  catType: 'sofa',
  demoMode: false,
  pickedColor: '#9C7856',
  searchItems: [],
  drag: null        // { id, sx, sy, fx, fy }
};

// ════════════════════════════════
// App ID / Setup
// ════════════════════════════════
function getAppId() {
  return new URLSearchParams(location.search).get('appId')
    || localStorage.getItem('rakutenAppId')
    || '';
}

function saveAppId() {
  const v = document.getElementById('appid-input').value.trim();
  if (!v) { alert('アプリIDを入力してください'); return; }
  localStorage.setItem('rakutenAppId', v);
  document.getElementById('setup').classList.add('hidden');
  doSearch();
}

function skipSetup() {
  S.demoMode = true;
  document.getElementById('setup').classList.add('hidden');
  showDemoResults();
}

function openSetup() {
  document.getElementById('appid-input').value = getAppId();
  document.getElementById('setup').classList.remove('hidden');
}

// ════════════════════════════════
// Room
// ════════════════════════════════
function initRoom() {
  const { w, h } = ROOM_CM[S.roomSize];
  const svg = document.getElementById('room-svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);

  // Scale to fit container
  const wrap = document.getElementById('room-wrap');
  const avail = wrap.clientWidth - 28;
  const scale = Math.min(1, avail / w);
  svg.style.width  = (w * scale) + 'px';
  svg.style.height = (h * scale) + 'px';

  ['svg-floor', 'svg-grid50', 'svg-grid100', 'svg-wall'].forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute('width', w);
    el.setAttribute('height', h);
  });

  document.getElementById('room-dim').textContent = `${w}×${h}cm`;

  // Scale bar (100cm)
  const sb = document.getElementById('scale-bar');
  sb.innerHTML = '';
  const bx = w - 115, by = h - 12;
  const line = s('line', { x1: bx, y1: by, x2: bx + 100, y2: by, stroke: '#666', 'stroke-width': 1.5 });
  const tick1 = s('line', { x1: bx, y1: by - 4, x2: bx, y2: by + 4, stroke: '#666', 'stroke-width': 1.5 });
  const tick2 = s('line', { x1: bx + 100, y1: by - 4, x2: bx + 100, y2: by + 4, stroke: '#666', 'stroke-width': 1.5 });
  const txt = s('text', { x: bx + 50, y: by - 5, 'text-anchor': 'middle', 'font-size': 8, fill: '#666' });
  txt.textContent = '100cm';
  sb.append(line, tick1, tick2, txt);

  renderAllFurniture();
}

// ════════════════════════════════
// SVG helpers
// ════════════════════════════════
function s(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function sr(x, y, w, h, fill, stroke = 'none', sw = 0, rx = 2) {
  return s('rect', { x, y, width: w, height: h, fill, stroke, 'stroke-width': sw, rx });
}

function sl(x1, y1, x2, y2, stroke, sw = 1) {
  return s('line', { x1, y1, x2, y2, stroke, 'stroke-width': sw });
}

function sc(cx, cy, r, fill) {
  return s('circle', { cx, cy, r, fill });
}

function shade(hex, amt) {
  if (!hex || hex[0] !== '#' || hex.length < 7) return hex || '#888';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const f = amt < 0 ? 1 + amt : 1;
  const a = amt > 0 ? amt : 0;
  const clamp = v => Math.min(255, Math.max(0, Math.round(v * f + 255 * a)));
  return '#' + [clamp(r), clamp(g), clamp(b)].map(v => v.toString(16).padStart(2, '0')).join('');
}

// ════════════════════════════════
// Furniture drawing (top-down SVG)
// ════════════════════════════════
function drawShape(f) {
  const g = s('g');
  const { w, h, color: c, type } = f;
  const dk  = shade(c, -.28);
  const dk2 = shade(c, -.45);
  const lt  = shade(c,  .28);

  if (type === 'sofa') {
    const bh  = h * .30;          // backrest height
    const aw  = w * .10;          // armrest width
    const sh  = h - bh;           // seat height
    const n   = w > 150 ? 3 : 2;
    const cw  = (w - aw * 2) / n; // cushion width
    // Seat cushions
    for (let i = 0; i < n; i++) {
      g.append(sr(aw + cw * i + 1, bh + 1, cw - 2, sh - 2, c, dk, .8, 4));
    }
    // Backrest
    g.append(sr(0, 0, w, bh, dk, dk2, 1, 2));
    // Armrests
    g.append(sr(0, bh, aw, sh, dk, dk2, 1, 2));
    g.append(sr(w - aw, bh, aw, sh, dk, dk2, 1, 2));
    // Highlight
    g.append(sl(aw + 2, bh * .5, w - aw - 2, bh * .5, 'rgba(255,255,255,.2)', 1));

  } else if (type === 'table') {
    const legR   = Math.min(w, h) * .07;
    const legOff = legR * 1.8;
    g.append(sr(0, 0, w, h, c, dk, 1.2, 3));
    // Legs
    [[legOff, legOff], [w - legOff, legOff],
     [legOff, h - legOff], [w - legOff, h - legOff]]
      .forEach(([cx, cy]) => g.append(sc(cx, cy, legR, dk2)));
    // Wood grain lines
    g.append(sl(0, h / 2, w, h / 2, 'rgba(0,0,0,.08)', .7));

  } else if (type === 'bed') {
    const hbH  = h * .14;   // headboard
    const pilH = h * .17;   // pillow height
    const pilW = w * .38;   // pillow width
    // Mattress
    g.append(sr(0, hbH, w, h - hbH, c, dk, 1, 2));
    // Headboard
    g.append(sr(0, 0, w, hbH + 4, dk, dk2, 1, 2));
    // Pillows
    g.append(sr(w * .04, hbH + 5, pilW, pilH, lt, dk, .6, 5));
    g.append(sr(w - pilW - w * .04, hbH + 5, pilW, pilH, lt, dk, .6, 5));
    // Fold line + center seam
    g.append(sl(0, hbH + pilH + 9, w, hbH + pilH + 9, 'rgba(0,0,0,.1)', 1));
    g.append(sl(w / 2, hbH + pilH + 9, w / 2, h, 'rgba(0,0,0,.07)', .8));

  } else if (type === 'storage') {
    g.append(sr(0, 0, w, h, c, dk, 1.5, 2));
    // Door split
    g.append(sl(w / 2, 0, w / 2, h, dk, 1.2));
    // Handles
    const hW = Math.max(4, w * .07), hH = Math.max(3, h * .1);
    g.append(sr(w / 2 - hW * 1.5, h / 2 - hH / 2, hW, hH, dk2, 'none', 0, 2));
    g.append(sr(w / 2 + hW * .5,  h / 2 - hH / 2, hW, hH, dk2, 'none', 0, 2));
    // Top/bottom rails
    g.append(sl(0, h * .08, w, h * .08, 'rgba(0,0,0,.1)', .6));
    g.append(sl(0, h * .92, w, h * .92, 'rgba(0,0,0,.1)', .6));

  } else {
    g.append(sr(0, 0, w, h, c, dk, 1.5, 3));
  }
  return g;
}

// ════════════════════════════════
// Render furniture
// ════════════════════════════════
function renderAllFurniture() {
  const grp = document.getElementById('furn-group');
  grp.innerHTML = '';
  S.furniture.forEach(f => grp.append(makeFurnEl(f)));
}

function makeFurnEl(f) {
  const g = s('g', { id: `f-${f.id}`, transform: `translate(${f.x},${f.y})`, style: 'cursor:move' });
  if (f.id === S.selectedId) g.classList.add('furniture-sel');

  const shape = drawShape(f);
  g.append(shape);

  // Label
  const fs  = Math.min(f.w, f.h) * .2;
  const lbl = s('text', {
    x: f.w / 2, y: f.h / 2 + fs * .35,
    'text-anchor': 'middle',
    'font-size': Math.max(6, Math.min(fs, 14)),
    fill: 'rgba(0,0,0,.45)',
    'pointer-events': 'none',
    'font-weight': '500'
  });
  lbl.textContent = f.name;
  g.append(lbl);

  return g;
}

function updateFurnEl(f) {
  const old = document.getElementById(`f-${f.id}`);
  if (!old) return;
  const n = makeFurnEl(f);
  old.parentNode.replaceChild(n, old);
}

// ════════════════════════════════
// Drag & Drop (mouse + touch)
// ════════════════════════════════
function svgPt(e) {
  const svg = document.getElementById('room-svg');
  const p   = svg.createSVGPoint();
  const src = e.touches ? e.touches[0] : e;
  p.x = src.clientX; p.y = src.clientY;
  return p.matrixTransform(svg.getScreenCTM().inverse());
}

document.getElementById('room-svg').addEventListener('pointerdown', e => {
  e.preventDefault();
  const pt = svgPt(e);

  // Walk up to find furniture group
  let el = e.target;
  while (el && el !== e.currentTarget) {
    if (el.id && el.id.startsWith('f-')) {
      const id = parseInt(el.id.slice(2));
      const f  = S.furniture.find(x => x.id === id);
      if (f) {
        selectFurn(id);
        S.drag = { id, sx: pt.x, sy: pt.y, fx: f.x, fy: f.y };
        return;
      }
    }
    el = el.parentElement;
  }
  deselect();
}, { passive: false });

document.getElementById('room-svg').addEventListener('pointermove', e => {
  if (!S.drag) return;
  e.preventDefault();
  const pt = svgPt(e);
  const { w, h } = ROOM_CM[S.roomSize];
  const f = S.furniture.find(x => x.id === S.drag.id);
  if (!f) return;
  f.x = Math.max(0, Math.min(w - f.w, S.drag.fx + pt.x - S.drag.sx));
  f.y = Math.max(0, Math.min(h - f.h, S.drag.fy + pt.y - S.drag.sy));
  const el = document.getElementById(`f-${f.id}`);
  if (el) el.setAttribute('transform', `translate(${f.x},${f.y})`);
}, { passive: false });

document.getElementById('room-svg').addEventListener('pointerup', () => { S.drag = null; });
document.getElementById('room-svg').addEventListener('pointerleave', () => { S.drag = null; });

// ════════════════════════════════
// Selection & panel
// ════════════════════════════════
function selectFurn(id) {
  if (S.selectedId !== null) {
    document.getElementById(`f-${S.selectedId}`)?.classList.remove('furniture-sel');
  }
  S.selectedId = id;
  const f = S.furniture.find(x => x.id === id);
  if (!f) return;

  document.getElementById(`f-${id}`)?.classList.add('furniture-sel');
  document.getElementById('fp-name').textContent = f.fullName || f.name;
  document.getElementById('sl-w').value = f.w;
  document.getElementById('sl-h').value = f.h;
  document.getElementById('lbl-w').textContent = f.w;
  document.getElementById('lbl-h').textContent = f.h;
  document.getElementById('cur-color-dot').style.background = f.color;

  const buyBtn = document.getElementById('buy-btn');
  buyBtn.disabled = !f.url;

  document.getElementById('furn-panel').classList.remove('hidden');
}

function deselect() {
  if (S.selectedId !== null) {
    document.getElementById(`f-${S.selectedId}`)?.classList.remove('furniture-sel');
  }
  S.selectedId = null;
  document.getElementById('furn-panel').classList.add('hidden');
}

function deleteSelected() {
  if (S.selectedId === null) return;
  S.furniture = S.furniture.filter(x => x.id !== S.selectedId);
  S.selectedId = null;
  document.getElementById('furn-panel').classList.add('hidden');
  renderAllFurniture();
}

function clearRoom() {
  if (S.furniture.length === 0) return;
  if (!confirm('部屋をリセットしますか？')) return;
  S.furniture = [];
  S.selectedId = null;
  document.getElementById('furn-panel').classList.add('hidden');
  renderAllFurniture();
}

function onSizeChange() {
  if (S.selectedId === null) return;
  const f = S.furniture.find(x => x.id === S.selectedId);
  if (!f) return;
  f.w = parseInt(document.getElementById('sl-w').value);
  f.h = parseInt(document.getElementById('sl-h').value);
  document.getElementById('lbl-w').textContent = f.w;
  document.getElementById('lbl-h').textContent = f.h;
  const { w, h } = ROOM_CM[S.roomSize];
  f.x = Math.min(f.x, w - f.w);
  f.y = Math.min(f.y, h - f.h);
  updateFurnEl(f);
}

function goBuy() {
  const f = S.furniture.find(x => x.id === S.selectedId);
  if (f?.url) window.open(f.url, '_blank', 'noopener');
}

// ════════════════════════════════
// Add product to room
// ════════════════════════════════
function addProductToRoom(idx) {
  const item = S.searchItems[idx];
  if (!item) return;

  const def = FURN_DEFAULTS[S.catType] || FURN_DEFAULTS.sofa;
  const { w: rw, h: rh } = ROOM_CM[S.roomSize];

  // Center in room, nudge each added item
  const nudge = (S.furniture.length % 5) * 8;
  const fx = Math.max(0, Math.min(rw - def.w, (rw - def.w) / 2 + nudge));
  const fy = Math.max(0, Math.min(rh - def.h, (rh - def.h) / 2 + nudge));

  const imgUrl  = item.mediumImageUrls?.[0]?.imageUrl
    ?.replace(/\?_ex=\d+x\d+/, '?_ex=400x400') || '';

  const f = {
    id:       S.nextId++,
    type:     S.catType,
    name:     (item.itemName || def.label).slice(0, 8) + (item.itemName?.length > 8 ? '…' : ''),
    fullName: item.itemName || def.label,
    url:      item.itemUrl || '',
    imageUrl: imgUrl,
    color:    def.color,
    w:        def.w,
    h:        def.h,
    x:        fx,
    y:        fy
  };

  S.furniture.push(f);
  renderAllFurniture();
  selectFurn(f.id);

  // Scroll room into view
  document.getElementById('room-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ════════════════════════════════
// Search
// ════════════════════════════════
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  const kw = document.getElementById('search-input').value.trim() || S.category;

  if (S.demoMode) { showDemoResults(); return; }

  const appId = getAppId();
  if (!appId) { openSetup(); return; }

  showLoading('検索中…');
  rakutenSearch(kw, appId);
}

function rakutenSearch(kw, appId) {
  // Clean up any previous script
  document.getElementById('rk-script')?.remove();

  const cb = 'rk_' + Date.now();
  let timer = setTimeout(() => {
    delete window[cb];
    showError('タイムアウトしました。もう一度お試しください。');
  }, 12000);

  window[cb] = data => {
    clearTimeout(timer);
    delete window[cb];
    document.getElementById('rk-script')?.remove();
    if (!data || !data.Items) {
      showError('データの取得に失敗しました。アプリIDを確認してください。');
      return;
    }
    const items = data.Items.map(i => i.Item || i);
    S.searchItems = items;
    renderResults(items);
  };

  const url = `https://app.rakuten.co.jp/services/api/IchibaItem/Search/20170706?format=json`
    + `&keyword=${encodeURIComponent(kw)}`
    + `&applicationId=${encodeURIComponent(appId)}`
    + `&callback=${cb}&hits=12&sort=-reviewCount&imageFlag=1`;

  const sc = document.createElement('script');
  sc.id = 'rk-script';
  sc.src = url;
  sc.onerror = () => {
    clearTimeout(timer);
    delete window[cb];
    showError('APIの呼び出しに失敗しました。アプリIDを確認してください。');
  };
  document.head.append(sc);
}

function renderResults(items) {
  const list = document.getElementById('results-list');
  document.getElementById('results-title').textContent =
    items.length ? `${items.length}件の商品` : '商品が見つかりませんでした';

  if (!items.length) {
    list.innerHTML = '<p class="hint">検索キーワードを変えてみてください</p>';
    return;
  }

  list.innerHTML = items.map((item, i) => {
    const img   = item.mediumImageUrls?.[0]?.imageUrl || '';
    const price = item.itemPrice ? `¥${Number(item.itemPrice).toLocaleString()}` : '';
    const name  = esc(item.itemName || '');
    return `
      <div class="result-item" data-idx="${i}">
        ${img
          ? `<img class="result-img" src="${esc(img)}" alt="" loading="lazy" onerror="this.style.opacity='.3'">`
          : `<div class="result-img"></div>`}
        <div class="result-info">
          <div class="result-name">${name}</div>
          <div class="result-price">${price}</div>
        </div>
        <button class="result-add" data-idx="${i}">追加</button>
      </div>`;
  }).join('');
}

// Event delegation for results
document.getElementById('results-list').addEventListener('click', e => {
  const btn  = e.target.closest('.result-add');
  const item = e.target.closest('.result-item');
  const el   = btn || item;
  if (!el) return;
  const idx = parseInt(el.dataset.idx);
  if (!isNaN(idx)) addProductToRoom(idx);
});

function showLoading(msg = '読み込み中…') {
  document.getElementById('results-title').textContent = msg;
  document.getElementById('results-list').innerHTML = `<p class="loading">⏳ ${msg}</p>`;
}

function showError(msg) {
  document.getElementById('results-title').textContent = 'エラー';
  document.getElementById('results-list').innerHTML = `<p class="hint">⚠️ ${msg}</p>`;
}

// ════════════════════════════════
// Color picker
// ════════════════════════════════
function openColorModal() {
  if (S.selectedId === null) return;
  const f = S.furniture.find(x => x.id === S.selectedId);
  if (!f) return;

  setPickedColor(f.color);
  const desc    = document.getElementById('color-desc');
  const canvas  = document.getElementById('color-canvas');
  const ctx     = canvas.getContext('2d');
  canvas.onclick = null;
  canvas.style.display = 'none';

  if (f.imageUrl) {
    desc.textContent = '商品写真をタップして色を選択できます';
    canvas.style.display = 'block';
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      canvas.onclick = ev => pickFromCanvas(ev, canvas, ctx);
    };
    img.onerror = () => {
      canvas.style.display = 'none';
      desc.textContent = '画像を読み込めませんでした。カラーピッカーで色を選択してください。';
    };
    img.src = f.imageUrl;
  } else {
    desc.textContent = 'カラーピッカーで色を選択してください。';
  }

  // EyeDropper API
  const edBtn = document.getElementById('eyedropper-btn');
  edBtn.style.display = window.EyeDropper ? '' : 'none';

  document.getElementById('color-modal').classList.remove('hidden');
}

function pickFromCanvas(e, canvas, ctx) {
  const r  = canvas.getBoundingClientRect();
  const sx = canvas.width  / r.width;
  const sy = canvas.height / r.height;
  const x  = (e.clientX - r.left) * sx;
  const y  = (e.clientY - r.top)  * sy;
  try {
    const px = ctx.getImageData(x, y, 1, 1).data;
    setPickedColor(rgbHex(px[0], px[1], px[2]));
  } catch {
    document.getElementById('color-desc').textContent =
      '⚠️ CORS制限のため画像から色を取得できません。カラーピッカーを使用してください。';
  }
}

async function useEyeDropper() {
  if (!window.EyeDropper) return;
  try {
    const result = await new EyeDropper().open();
    setPickedColor(result.sRGBHex);
  } catch { /* cancelled */ }
}

function setPickedColor(hex) {
  S.pickedColor = hex;
  document.getElementById('picked-swatch').style.background = hex;
  document.getElementById('manual-color').value = hex;
}

function applyColor() {
  const f = S.furniture.find(x => x.id === S.selectedId);
  if (f) {
    f.color = S.pickedColor;
    document.getElementById('cur-color-dot').style.background = S.pickedColor;
    updateFurnEl(f);
  }
  closeColorModal();
}

function closeColorModal() {
  document.getElementById('color-modal').classList.add('hidden');
}

// ════════════════════════════════
// Utilities
// ════════════════════════════════
function rgbHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ════════════════════════════════
// Init
// ════════════════════════════════
function init() {
  if (!getAppId()) {
    document.getElementById('setup').classList.remove('hidden');
  }
  initRoom();

  // Show hint in results
  document.getElementById('results-title').textContent = 'カテゴリを選んで家具を追加しましょう';

  // Auto-search if API key exists
  if (getAppId()) doSearch();
  else if (document.getElementById('setup').classList.contains('hidden')) showDemoResults();
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', initRoom);
